version: '3.9'

services:
  # ── MySQL Database ────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: cyber_ai_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: CyberAI@2024
      MYSQL_DATABASE: cyber_ai_db
      MYSQL_USER: cyberai
      MYSQL_PASSWORD: CyberAI@2024
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ── Flask Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber_ai_backend
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      DATABASE_URL: mysql+pymysql://cyberai:CyberAI@2024@db/cyber_ai_db
      JWT_SECRET_KEY: super-secret-jwt-key-change-me
      SECRET_KEY: super-secret-flask-key-change-me
    volumes:
      - ./ml_model:/app/ml_model
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyber_ai_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
